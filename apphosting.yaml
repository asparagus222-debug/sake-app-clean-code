# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

webFramework: Next.js # Explicitly declare Next.js

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: GOOGLE_API_KEY
    secret: GOOGLE_API_KEY
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
  # ECPay AIO 全方位金流 — 在 Firebase Secret Manager 中建立這三個 secret
  - variable: ECPAY_MERCHANT_ID
    secret: ECPAY_MERCHANT_ID
  - variable: ECPAY_HASH_KEY
    secret: ECPAY_HASH_KEY
  - variable: ECPAY_HASH_IV
    secret: ECPAY_HASH_IV
  # 設定為 'false' 切換至正式環境；'true' 使用測試環境
  - variable: ECPAY_IS_TEST
    value: 'true'
  # App Hosting 正式 URL
  - variable: NEXT_PUBLIC_BASE_URL
    value: 'https://studio--drinking-notes.us-central1.hosted.app'
